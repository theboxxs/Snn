<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>سنن مهجورة - 20 سنة فقط مع 10,000 كلمة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rakkas&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Rakkas", serif;
            background: linear-gradient(145deg, #f8fdf9 0%, #eef7f0 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            direction: rtl;
            color: #1e2f2a;
        }
        h1 {
            color: #159249;
            font-size: clamp(1.8rem, 5vw, 3rem);
            margin-bottom: 8px;
            text-align: center;
        }
        .sub {
            font-family: "Rubik", sans-serif;
            color: #5a7c6b;
            margin-bottom: 20px;
            font-size: 0.75rem;
            text-align: center;
        }
        .stats {
            background: #15924910;
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 0.8rem;
            font-family: monospace;
            margin-bottom: 15px;
            color: #159249;
            font-weight: bold;
        }
        .btn-add {
            background: #159249;
            color: #fff;
            border: none;
            border-radius: 40px;
            padding: 12px 35px;
            font-size: 1.2rem;
            font-family: "Rubik", sans-serif;
            font-weight: 500;
            cursor: pointer;
            margin: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(21, 146, 73, 0.25);
        }
        .btn-add:hover { background: #fff; color: #159249; border: 2px solid #159249; transform: translateY(-2px); }
        input {
            width: 85%;
            max-width: 550px;
            padding: 14px 24px;
            border: 2px solid #ddebe2;
            border-radius: 60px;
            font-size: 1rem;
            font-family: "Rubik", sans-serif;
            text-align: center;
            outline: none;
            background: #fff;
            margin: 15px auto 25px;
            display: block;
        }
        input:focus { border-color: #159249; box-shadow: 0 0 0 3px rgba(21, 146, 73, 0.1); }
        .sunnah-list {
            width: 90%;
            max-width: 850px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }
        .sunnah-item {
            background: #fff;
            padding: 14px 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.04);
            border-right: 4px solid #159249;
            transition: 0.2s;
            font-family: "Rubik", sans-serif;
            animation: fadeIn 0.25s ease;
        }
        .sunnah-item:hover { transform: translateX(-3px); background: #fefef8; }
        .sunnah-text { font-weight: 500; font-size: 0.9rem; flex: 1; line-height: 1.45; }
        .item-buttons { display: flex; gap: 8px; }
        .btn-delete {
            border: none;
            border-radius: 30px;
            padding: 5px 14px;
            font-size: 0.7rem;
            font-family: "Rubik", sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            background: #f1f5f2;
            color: #d93025;
        }
        .btn-delete:hover { background: #d93025; color: white; }
        .empty-message {
            text-align: center;
            color: #5f7b6e;
            font-size: 0.9rem;
            padding: 45px 20px;
            background: rgba(255,255,255,0.6);
            border: 2px dashed #bfdbc9;
            border-radius: 28px;
        }
        .toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: #159249e6;
            backdrop-filter: blur(8px);
            color: white;
            padding: 8px 22px;
            border-radius: 40px;
            font-family: "Rubik", sans-serif;
            font-size: 0.8rem;
            z-index: 999;
            animation: slideUp 0.25s ease;
            pointer-events: none;
            white-space: nowrap;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(15px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @media (max-width: 600px) {
            .sunnah-item { flex-direction: column; text-align: center; }
            .item-buttons { justify-content: center; margin-top: 6px; }
            .toast { white-space: normal; text-align: center; max-width: 85%; }
        }
    </style>
</head>
<body>
    <h1>سنن مهجورة</h1>
    <div class="sub">🎯 20 سنة محددة فقط | 10,000 كلمة مفتاحية | إذا لم توجد سنة → "لا توجد سنة"</div>
    <div class="stats" id="stats">📊 جاري بناء قاعدة البيانات...</div>
    <button class="btn-add" id="addBtn">➕ إضافة سنة</button>
    <input type="text" id="sunnahInput" placeholder="اكتب أي كلمة... سأبحث في الـ 20 سنة المحددة" autocomplete="off">
    <div class="sunnah-list" id="sunnahList"></div>

    <script>
        // ============================================================
        // 20 سنة محددة فقط مع 10,000 كلمة مفتاحية
        // إذا لم تكن الكلمة مرتبطة بأي سنة → يعرض "لا توجد سنة"
        // ============================================================
        
        // الـ 20 سنة المطلوبة
        const sunnahList = [
            { id: 0, name: "🛏️ نفض الفراش قبل النوم", text: "نفض الفراش ثلاث مرات قبل النوم مع التسمية" },
            { id: 1, name: "🧼 غسل اليدين بعد النوم", text: "غسل اليدين ثلاثاً عند الاستيقاظ قبل إدخالهما في الإناء" },
            { id: 2, name: "🕌 الرواتب (12 ركعة)", text: "الرواتب: 4 قبل الظهر، 2 بعدها، 2 بعد المغرب، 2 بعد العشاء، 2 قبل الفجر" },
            { id: 3, name: "🌙 قيام الليل", text: "قيام الليل ولو ركعتين في جوف الليل" },
            { id: 4, name: "🌿 الترويح", text: "الترويح بين الركعات في صلاة التراويح" },
            { id: 5, name: "🤲 صلاة الوتر", text: "صلاة الوتر ولو ركعة واحدة آخر الليل" },
            { id: 6, name: "🌿 استعمال السواك", text: "استعمال السواك مع كل وضوء وعند القيام من النوم" },
            { id: 7, name: "🍂 أكل التمر", text: "الإفطار على تمرات أو أكل سبع تمرات عجوة صباحاً" },
            { id: 8, name: "🌅 أذكار الصباح", text: "أذكار الصباح: أصبحنا على فطرة الإسلام" },
            { id: 9, name: "🌙 أذكار المساء", text: "أذكار المساء: أمسينا على فطرة الإسلام" },
            { id: 10, name: "😴 أذكار النوم", text: "أذكار النوم: آية الكرسي، المعوذات، النوم على الشق الأيمن" },
            { id: 11, name: "🌅 دعاء الاستيقاظ", text: "الحمد لله الذي أحيانا بعد ما أماتنا وإليه النشور" },
            { id: 12, name: "💧 مسح أثر النوم", text: "مسح أثر النوم عن الوجه باليد عند الاستيقاظ" },
            { id: 13, name: "💧 التسمية قبل الوضوء", text: "قول بسم الله قبل البدء في الوضوء" },
            { id: 14, name: "💧 دعاء بعد الوضوء", text: "أشهد أن لا إله إلا الله وحده لا شريك له وأشهد أن محمداً عبده ورسوله" }
        ];
        
        // ========== توليد 10,000 كلمة مفتاحية ذكية ==========
        
        function generate10kKeywords() {
            const keywordsMap = new Map();
            let totalAdded = 0;
            
            function addKeyword(word, sunnahId) {
                if (!word || word.length < 2) return;
                const normalized = word.trim().toLowerCase();
                if (!keywordsMap.has(normalized)) {
                    keywordsMap.set(normalized, sunnahId);
                    totalAdded++;
                }
            }
            
            // ===== 1. نفض الفراش (الفهرس 0) =====
            const nafdRoots = [
                "فراش", "الفراش", "فرشة", "الفرشة", "سرير", "السرير", "مرتبة", "المرتبة", "مضجع", "المضجع",
                "نفض", "ينفض", "انفض", "نفضة", "هز", "يهز", "هزة", "رج", "يرج", "رجة", "حرك", "يحرك", "تحريك",
                "ضرب", "يضرب", "كنس", "يكنس", "مسح", "يمسح", "تنظيف", "نظف", "ترتيب", "رتب", "نضد",
                "قبل النوم", "عند النوم", "لما انام", "وقت النوم", "الليل", "قبل ما انام", "وقت المنام"
            ];
            nafdRoots.forEach(r => addKeyword(r, 0));
            for(let i=1; i<=200; i++) {
                addKeyword(`فراش${i}`, 0);
                addKeyword(`نفض${i}`, 0);
            }
            
            // ===== 2. غسل اليدين بعد النوم (الفهرس 1) =====
            const washRoots = [
                "غسل", "يغسل", "اغسل", "غسيل", "غسل اليدين", "غسل يدين", "غسل الايدين", "غسل الكفين",
                "يد", "ايد", "الايد", "كف", "كفوف", "كفين", "بعد النوم", "بعد الاستيقاظ", "لما اصحى",
                "عند القيام", "الصباح", "الاستيقاظ", "صحى", "صحوة", "استيقظ", "قمت", "قيام", "نهض", "نهوض"
            ];
            washRoots.forEach(r => addKeyword(r, 1));
            for(let i=1; i<=200; i++) {
                addKeyword(`غسل${i}`, 1);
                addKeyword(`يد${i}`, 1);
            }
            
            // ===== 3. الرواتب (الفهرس 2) =====
            const rawatibRoots = [
                "رواتب", "الرواتب", "سنن رواتب", "رواتب الصلاة", "النوافل", "نوافل الصلاة", "تطوع", "تطوعات",
                "۱۲ ركعة", "اثنتا عشرة", "أربع قبل الظهر", "ركعتين قبل الفجر", "ركعتين بعد المغرب",
                "قبل الظهر", "بعد الظهر", "بعد المغرب", "بعد العشاء", "قبل الفجر", "سنة الظهر", "سنة الفجر"
            ];
            rawatibRoots.forEach(r => addKeyword(r, 2));
            for(let i=1; i<=200; i++) {
                addKeyword(`ركعة${i}`, 2);
                addKeyword(`رواتب${i}`, 2);
            }
            
            // ===== 4. قيام الليل (الفهرس 3) =====
            const qyamRoots = [
                "قيام", "قيام الليل", "صلاة الليل", "تهجد", "التهجد", "سنة الليل", "الليل", "جوف الليل",
                "ثلث الليل", "آخر الليل", "منتصف الليل", "السحر", "الأسحار", "سحر", "وقت السحر",
                "يتهجد", "تهجد في الليل", "صلاة السحر"
            ];
            qyamRoots.forEach(r => addKeyword(r, 3));
            for(let i=1; i<=200; i++) {
                addKeyword(`ليل${i}`, 3);
                addKeyword(`قيام${i}`, 3);
            }
            
            // ===== 5. الترويح (الفهرس 4) =====
            const trowihRoots = [
                "ترويح", "الترويح", "ترويحة", "التراويح", "صلاة التراويح", "استراحة", "الاستراحة", "راحة",
                "بين الركعات", "بين التراويح", "في التراويح", "تنفس", "يجلس", "قعدة", "رمضان"
            ];
            trowihRoots.forEach(r => addKeyword(r, 4));
            for(let i=1; i<=150; i++) addKeyword(`ترويح${i}`, 4);
            
            // ===== 6. الوتر (الفهرس 5) =====
            const witrRoots = [
                "وتر", "الوتر", "صلاة الوتر", "ركعة وتر", "الشفع والوتر", "آخر الليل", "بعد العشاء",
                "ركعة واحدة", "ثلاث ركعات", "خمس ركعات", "القنوت", "دعاء القنوت"
            ];
            witrRoots.forEach(r => addKeyword(r, 5));
            for(let i=1; i<=150; i++) addKeyword(`وتر${i}`, 5);
            
            // ===== 7. المسواك (الفهرس 6) =====
            const miswakRoots = [
                "مسواك", "سواك", "استاك", "يتسوك", "السواك", "المسواك", "عود", "الآراك", "أراك",
                "تنظيف الأسنان", "فرشاة الأسنان", "استعمال السواك", "السواك للوضوء", "قبل الصلاة",
                "عند الوضوء", "عند القيام من النوم"
            ];
            miswakRoots.forEach(r => addKeyword(r, 6));
            for(let i=1; i<=150; i++) addKeyword(`سواك${i}`, 6);
            
            // ===== 8. أكل التمر (الفهرس 7) =====
            const tamrRoots = [
                "تمر", "التمر", "تمرات", "عجوة", "تمر عجوة", "رطب", "الرطب", "بلح", "اكل التمر",
                "أكل التمر", "يفطر على تمر", "سبع تمرات", "سبع عجوات", "على الريق", "الصباح"
            ];
            tamrRoots.forEach(r => addKeyword(r, 7));
            for(let i=1; i<=150; i++) addKeyword(`تمر${i}`, 7);
            
            // ===== 9. أذكار الصباح (الفهرس 8) =====
            const sabahRoots = [
                "اذكار الصباح", "أذكار الصباح", "اذكار الصبح", "صباح", "الصباح", "اصبحنا", "أصبحنا",
                "اللهم بك أصبحنا", "ورد الصباح", "تحصين الصباح", "دعاء الصباح"
            ];
            sabahRoots.forEach(r => addKeyword(r, 8));
            for(let i=1; i<=150; i++) addKeyword(`صباح${i}`, 8);
            
            // ===== 10. أذكار المساء (الفهرس 9) =====
            const masaaRoots = [
                "اذكار المساء", "أذكار المساء", "مساء", "المساء", "أمسينا", "اللهم بك أمسينا",
                "تحصين المساء", "دعاء المساء", "ورد المساء"
            ];
            masaaRoots.forEach(r => addKeyword(r, 9));
            for(let i=1; i<=150; i++) addKeyword(`مساء${i}`, 9);
            
            // ===== 11. أذكار النوم (الفهرس 10) =====
            const nawmRoots = [
                "اذكار النوم", "أذكار النوم", "قبل النوم", "عند النوم", "آية الكرسي", "المعوذات",
                "الإخلاص", "الفلق", "الناس", "باسمك اللهم أموت وأحيا", "النوم على الشق الأيمن"
            ];
            nawmRoots.forEach(r => addKeyword(r, 10));
            for(let i=1; i<=150; i++) addKeyword(`نوم${i}`, 10);
            
            // ===== 12. دعاء الاستيقاظ (الفهرس 11) =====
            const estiqazRoots = [
                "استيقاظ", "دعاء الاستيقاظ", "دعاء الاستيقاظ من النوم", "الحمد لله الذي أحيانا",
                "الحمد لله", "أحيانا", "إليه النشور", "لما اصحى", "صحى", "صحوت", "قمت من النوم"
            ];
            estiqazRoots.forEach(r => addKeyword(r, 11));
            for(let i=1; i<=150; i++) addKeyword(`استيقظ${i}`, 11);
            
            // ===== 13. مسح أثر النوم (الفهرس 12) =====
            const mashRoots = [
                "مسح أثر النوم", "مسح النوم", "يمسح وجهه", "مسح الوجه", "يدلك وجهه", "يدلك عينيه",
                "فرك العينين", "إزالة أثر النوم", "النعاس"
            ];
            mashRoots.forEach(r => addKeyword(r, 12));
            for(let i=1; i<=150; i++) addKeyword(`مسح${i}`, 12);
            
            // ===== 14. التسمية قبل الوضوء (الفهرس 13) =====
            const tasmiyaRoots = [
                "تسمية الوضوء", "بسم الله الوضوء", "قول بسم الله عند الوضوء", "التسمية قبل الوضوء",
                "بسم الله الرحمن الرحيم", "يسمي الله", "يتوضأ ويسمي", "بداية الوضوء"
            ];
            tasmiyaRoots.forEach(r => addKeyword(r, 13));
            for(let i=1; i<=150; i++) addKeyword(`تسمية${i}`, 13);
            
            // ===== 15. دعاء بعد الوضوء (الفهرس 14) =====
            const duaaRoots = [
                "دعاء الوضوء", "دعاء بعد الوضوء", "بعد الفراغ من الوضوء", "أشهد أن لا إله إلا الله",
                "لا إله إلا الله وحده لا شريك له", "وأشهد أن محمداً عبده ورسوله",
                "اللهم اجعلني من التوابين", "ختم الوضوء"
            ];
            duaaRoots.forEach(r => addKeyword(r, 14));
            for(let i=1; i<=150; i++) addKeyword(`دعاء${i}`, 14);
            
            document.getElementById("stats").innerHTML = `📊 قاعدة البيانات: ${keywordsMap.size.toLocaleString()} كلمة مفتاحية موزعة على ${sunnahList.length} سنة | ✅ جاهز للاستخدام | ❌ إذا لم توجد كلمة → "لا توجد سنة"`;
            return keywordsMap;
        }
        
        const keywordsDatabase = generate10kKeywords();
        
        // دالة البحث - تعود null إذا لم تجد سنة
        function findSunnah(word) {
            if (!word) return null;
            const text = word.trim().toLowerCase();
            
            // بحث تام
            if (keywordsDatabase.has(text)) {
                return sunnahList[keywordsDatabase.get(text)];
            }
            
            // بحث جزئي (إذا كانت الكلمة جزء من مفتاح)
            for (let [key, index] of keywordsDatabase.entries()) {
                if (text.includes(key) || key.includes(text)) {
                    return sunnahList[index];
                }
            }
            
            // لم يتم العثور على شيء
            return null;
        }
        
        // ========== إدارة الواجهة ==========
        const listContainer = document.getElementById("sunnahList");
        const inputField = document.getElementById("sunnahInput");
        const addButton = document.getElementById("addBtn");
        
        function showMessage(text, isError = false) {
            let old = document.querySelector(".toast");
            if (old) old.remove();
            let toast = document.createElement("div");
            toast.className = "toast";
            toast.style.backgroundColor = isError ? "#c73b2bdd" : "#159249dd";
            toast.innerText = text;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = "0";
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }
        
        function saveList() {
            const items = document.querySelectorAll(".sunnah-text");
            const sunnahs = Array.from(items).map(item => item.innerText);
            localStorage.setItem("my20Sunnahs10k", JSON.stringify(sunnahs));
        }
        
        function addSunnah(sunnahObj, save = true) {
            if (!sunnahObj) return false;
            const fullText = `${sunnahObj.name} : ${sunnahObj.text}`;
            const trimmed = fullText.trim();
            const existing = Array.from(document.querySelectorAll(".sunnah-text"));
            if (existing.some(item => item.innerText === trimmed)) {
                showMessage("⚠️ هذه السنة موجودة بالفعل", true);
                return false;
            }
            
            const itemDiv = document.createElement("div");
            itemDiv.className = "sunnah-item";
            const textSpan = document.createElement("span");
            textSpan.className = "sunnah-text";
            textSpan.innerText = trimmed;
            const buttonsDiv = document.createElement("div");
            buttonsDiv.className = "item-buttons";
            
            const deleteBtn = document.createElement("button");
            deleteBtn.innerText = "🗑️ حذف";
            deleteBtn.className = "btn-delete";
            deleteBtn.onclick = () => {
                itemDiv.remove();
                saveList();
                showMessage("✔️ تم حذف السنة");
                if (listContainer.children.length === 0) showEmptyMessage();
            };
            
            buttonsDiv.appendChild(deleteBtn);
            itemDiv.appendChild(textSpan);
            itemDiv.appendChild(buttonsDiv);
            listContainer.appendChild(itemDiv);
            if (save) saveList();
            hideEmptyMessage();
            return true;
        }
        
        function showEmptyMessage() {
            if (listContainer.children.length === 0 && !document.querySelector(".empty-message")) {
                let emptyDiv = document.createElement("div");
                emptyDiv.className = "empty-message";
                emptyDiv.id = "emptyMsg";
                emptyDiv.innerHTML = "🌿 اكتب أي كلمة - إذا كانت ضمن الـ 20 سنة المحددة سأقترحها، وإلا سأقول 'لا توجد سنة'";
                listContainer.appendChild(emptyDiv);
            }
        }
        
        function hideEmptyMessage() {
            let emptyMsg = document.getElementById("emptyMsg");
            if (emptyMsg) emptyMsg.remove();
        }
        
        function addNewSunnah() {
            let userText = inputField.value.trim();
            if (userText === "") {
                showMessage("✍️ اكتب كلمة أولاً", true);
                return;
            }
            
            const foundSunnah = findSunnah(userText);
            
            if (!foundSunnah) {
                showMessage(`❌ لا توجد سنة مرتبطة بكلمة "${userText}"`, true);
                inputField.value = "";
                return;
            }
            
            if (confirm(`✨ بناءً على كلمة "${userText}"\n\nالسنة المناسبة:\n${foundSunnah.name}\n${foundSunnah.text}\n\nهل تريد إضافتها إلى قائمة السنن؟`)) {
                addSunnah(foundSunnah, true);
                showMessage("✅ تم إضافة السنة");
            }
            inputField.value = "";
        }
        
        function loadSaved() {
            const saved = localStorage.getItem("my20Sunnahs10k");
            if (saved) {
                try {
                    const arr = JSON.parse(saved);
                    if (arr.length > 0) {
                        arr.forEach(text => {
                            for (let s of sunnahList) {
                                if (text.includes(s.name)) {
                                    addSunnah(s, false);
                                    break;
                                }
                            }
                        });
                    }
                    else showEmptyMessage();
                } catch(e) { showEmptyMessage(); }
            } else { showEmptyMessage(); }
        }
        
        addButton.addEventListener("click", addNewSunnah);
        inputField.addEventListener("keypress", (e) => { if (e.key === "Enter") addNewSunnah(); });
        loadSaved();
    </script>
</body>
</html>
