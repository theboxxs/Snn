<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>سنن مهجورة - الرئيسية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rakkas&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Rakkas", serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 15px;
            direction: rtl;
            transition: all 0.3s ease;
        }
        body.light {
            background: linear-gradient(145deg, #f8fdf9 0%, #eef7f0 100%);
            color: #1e2f2a;
        }
        body.dark {
            background: linear-gradient(145deg, #0d1117 0%, #161b22 100%);
            color: #c9d1d9;
        }
        
        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 600px;
        }
        h1 {
            font-size: clamp(1.8rem, 5vw, 3rem);
            text-align: center;
        }
        body.light h1 { color: #159249; }
        body.dark h1 { color: #58a6ff; }
        
        .sub {
            font-size: 0.8rem;
            margin-bottom: 15px;
            text-align: center;
        }
        body.light .sub { color: #5a7c6b; }
        body.dark .sub { color: #8b949e; }
        
        .btn-toggle {
            background: none;
            border: 2px solid;
            border-radius: 40px;
            padding: 6px 18px;
            font-family: "Rubik", sans-serif;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        body.light .btn-toggle {
            border-color: #159249;
            color: #159249;
        }
        body.light .btn-toggle:hover {
            background: #159249;
            color: white;
        }
        body.dark .btn-toggle {
            border-color: #58a6ff;
            color: #58a6ff;
        }
        body.dark .btn-toggle:hover {
            background: #58a6ff;
            color: #0d1117;
        }
        
        /* ===== بطاقات التنقل ===== */
        .nav-cards {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            width: 92%;
            max-width: 700px;
            margin-bottom: 25px;
        }
        .nav-card {
            flex: 1;
            min-width: 160px;
            max-width: 220px;
            padding: 25px 20px;
            border-radius: 24px;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        body.light .nav-card {
            background: white;
            color: #1e2f2a;
            border-color: #e2e8e4;
        }
        body.light .nav-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(21, 146, 73, 0.15);
            border-color: #159249;
        }
        body.dark .nav-card {
            background: #161b22;
            color: #c9d1d9;
            border-color: #30363d;
        }
        body.dark .nav-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            border-color: #58a6ff;
        }
        
        .nav-card .icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: block;
        }
        .nav-card .title {
            font-size: 1.1rem;
            font-weight: 600;
        }
        .nav-card .desc {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 5px;
        }
        
        /* ===== قسم التنظيم الأسبوعي المختصر ===== */
        .weekly-preview {
            width: 92%;
            max-width: 700px;
            border-radius: 24px;
            padding: 20px;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }
        body.light .weekly-preview {
            background: white;
            border: 1px solid #e2e8e4;
        }
        body.dark .weekly-preview {
            background: #161b22;
            border: 1px solid #30363d;
        }
        
        .weekly-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .weekly-title {
            font-size: 1rem;
            font-weight: 500;
        }
        body.light .weekly-title { color: #159249; }
        body.dark .weekly-title { color: #58a6ff; }
        
        .btn-view-all {
            background: none;
            border: 2px solid;
            border-radius: 30px;
            padding: 4px 14px;
            font-family: "Rubik", sans-serif;
            font-size: 0.7rem;
            cursor: pointer;
            text-decoration: none;
            transition: 0.2s;
        }
        body.light .btn-view-all {
            border-color: #159249;
            color: #159249;
        }
        body.light .btn-view-all:hover {
            background: #159249;
            color: white;
        }
        body.dark .btn-view-all {
            border-color: #58a6ff;
            color: #58a6ff;
        }
        body.dark .btn-view-all:hover {
            background: #58a6ff;
            color: #0d1117;
        }
        
        .task-item-preview {
            padding: 8px 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
            transition: all 0.2s;
            font-family: "Rubik", sans-serif;
            font-size: 0.8rem;
        }
        body.light .task-item-preview {
            background: #f8fdf9;
        }
        body.dark .task-item-preview {
            background: #0d1117;
        }
        .task-item-preview .day-label {
            font-size: 0.6rem;
            padding: 2px 10px;
            border-radius: 20px;
        }
        body.light .task-item-preview .day-label {
            background: #eef7f0;
            color: #159249;
        }
        body.dark .task-item-preview .day-label {
            background: #21262d;
            color: #58a6ff;
        }
        .task-item-preview .task-text {
            flex: 1;
        }
        .task-item-preview .task-status {
            font-size: 0.8rem;
        }
        
        .empty-message {
            text-align: center;
            font-size: 0.8rem;
            padding: 20px;
            border-radius: 16px;
        }
        body.light .empty-message {
            color: #5a7c6b;
            background: rgba(255,255,255,0.6);
            border: 2px dashed #bfdbc9;
        }
        body.dark .empty-message {
            color: #8b949e;
            background: rgba(255,255,255,0.03);
            border: 2px dashed #30363d;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            backdrop-filter: blur(8px);
            color: white;
            padding: 6px 20px;
            border-radius: 40px;
            font-family: "Rubik", sans-serif;
            font-size: 0.75rem;
            z-index: 999;
            animation: slideUp 0.25s ease;
            pointer-events: none;
            white-space: nowrap;
        }
        body.light .toast { background: #159249e6; }
        body.dark .toast { background: #238636e6; }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(15px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        @media (max-width: 600px) {
            .nav-cards { flex-direction: column; align-items: center; }
            .nav-card { max-width: 100%; width: 100%; }
            .toast { white-space: normal; text-align: center; max-width: 85%; }
        }
    </style>
</head>
<body class="light" id="body">
    <div class="header">
        <h1>📿 سنن مهجورة</h1>
        <button class="btn-toggle" id="toggleBtn">🌙 الوضع الداكن</button>
    </div>
    <div class="sub">📅 تنظيم أسبوعي للسنن والمهام | 📚 مكتبة متكاملة للسنن</div>

    <!-- بطاقات التنقل -->
    <div class="nav-cards">
        <a href="javascript:void(0)" class="nav-card" id="goToTasks">
            <span class="icon">📋</span>
            <div class="title">المهام الأسبوعية</div>
            <div class="desc">إدارة مهامك اليومية والأسبوعية</div>
        </a>
        <a href="javascript:void(0)" class="nav-card" id="goToLibrary">
            <span class="icon">📚</span>
            <div class="title">مكتبة السنن</div>
            <div class="desc">استعراض جميع السنن وتصنيفاتها</div>
        </a>
    </div>

    <!-- معاينة المهام الأسبوعية -->
    <div class="weekly-preview">
        <div class="weekly-header">
            <span class="weekly-title">📅 مهام هذا الأسبوع</span>
            <a href="javascript:void(0)" class="btn-view-all" id="goToTasksFull">عرض الكل</a>
        </div>
        <div id="previewTasks"></div>
    </div>

    <script>
        const dayNames = {
            saturday: 'السبت', sunday: 'الأحد', monday: 'الإثنين',
            tuesday: 'الثلاثاء', wednesday: 'الأربعاء', thursday: 'الخميس', friday: 'الجمعة'
        };
        const dayOrder = ['saturday', 'sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday'];

        // ===== تحميل المهام من localStorage =====
        function loadTasks() {
            const saved = localStorage.getItem("weeklyTasks");
            if (saved) {
                try {
                    return JSON.parse(saved);
                } catch(e) { return []; }
            }
            return [];
        }

        // ===== عرض معاينة المهام =====
        function renderPreview() {
            const container = document.getElementById("previewTasks");
            const tasks = loadTasks();
            
            if (tasks.length === 0) {
                container.innerHTML = `<div class="empty-message">🌿 لا توجد مهام بعد... أضف مهامك في صفحة المهام الأسبوعية</div>`;
                return;
            }
            
            // عرض آخر 5 مهام (الأحدث)
            const recent = tasks.slice(-5).reverse();
            container.innerHTML = '';
            recent.forEach(task => {
                const div = document.createElement('div');
                div.className = 'task-item-preview';
                const dayLabel = document.createElement('span');
                dayLabel.className = 'day-label';
                dayLabel.textContent = dayNames[task.day] || task.day;
                const textSpan = document.createElement('span');
                textSpan.className = 'task-text';
                textSpan.textContent = task.text.length > 40 ? task.text.substring(0, 40) + '...' : task.text;
                const statusSpan = document.createElement('span');
                statusSpan.className = 'task-status';
                statusSpan.textContent = task.completed ? '✅' : '⏳';
                
                div.appendChild(dayLabel);
                div.appendChild(textSpan);
                div.appendChild(statusSpan);
                container.appendChild(div);
            });
        }

        // ===== التنقل بين الصفحات =====
        function showPage(page) {
            if (page === 'tasks') {
                window.location.href = 'tasks.html';
            } else if (page === 'library') {
                window.location.href = 'library.html';
            }
        }

        // ===== الوضع الداكن =====
        function toggleMode() {
            const isDark = body.classList.toggle('dark');
            body.classList.toggle('light');
            toggleBtn.textContent = isDark ? '☀️ الوضع الفاتح' : '🌙 الوضع الداكن';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                body.classList.add('dark');
                body.classList.remove('light');
                toggleBtn.textContent = '☀️ الوضع الفاتح';
            } else {
                body.classList.add('light');
                body.classList.remove('dark');
                toggleBtn.textContent = '🌙 الوضع الداكن';
            }
        }

        // ===== أحداث =====
        document.getElementById('goToTasks').addEventListener('click', () => showPage('tasks'));
        document.getElementById('goToTasksFull').addEventListener('click', () => showPage('tasks'));
        document.getElementById('goToLibrary').addEventListener('click', () => showPage('library'));
        toggleBtn.addEventListener('click', toggleMode);
        
        loadTheme();
        renderPreview();
    </script>
</body>
</html>
